services:
  # ── API / Express server ──────────────────────────────────────────────────
  - type: web
    name: teamup-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production

  # ── React client (Static Site) ────────────────────────────────────────────
  - type: static
    name: teamup-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
